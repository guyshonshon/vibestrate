name: CI (Windows)

# Native Windows verification - a SEPARATE pipeline from ci.yml on purpose.
# It runs on the same events as the main gate (push to main, PRs) so Windows is
# checked on every change, but it is NOT a required gate: ci.yml never waits on
# it and nothing depends on its result. The build stays fast and Windows-
# independent; this just runs in parallel and reports its own status.
#
# Trigger it manually any time:
#   gh workflow run "CI (Windows)"
# See docs/content/getting-started/windows.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Git identity for commit-making tests; autocrlf off so checkouts are
      # byte-exact (the Windows runner defaults to autocrlf=true, which rewrites
      # LF->CRLF and breaks content assertions).
      - name: Configure git (identity + autocrlf off)
        run: |
          git config --global user.email "ci@vibestrate.local"
          git config --global user.name "Vibestrate CI"
          git config --global core.autocrlf false

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
