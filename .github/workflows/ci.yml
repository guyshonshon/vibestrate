name: CI

# Typecheck, test, and build on every push to main and every PR. This is the
# fast required gate, Ubuntu only. Native Windows is verified separately and on
# demand (.github/workflows/ci-windows.yml) so it never slows down a push and
# nothing here depends on it.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Several tests make real git commits (e.g. git-init); GitHub runners have
      # no default git identity.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@vibestrate.local"
          git config --global user.name "Vibestrate CI"

      - name: Typecheck
        run: pnpm typecheck

      # Build before test: the shell-command-runner test spawns the
      # bundled dist/index.js, so dist must exist first.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
