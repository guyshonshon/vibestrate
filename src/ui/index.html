<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Vibestrate - Mission Control</title>
    <script>
      // Pre-paint theme: apply stored choice, else system preference, before
      // first paint so there's no flash of the wrong theme. Kept in sync at
      // runtime by src/ui/lib/theme.ts.
      (function () {
        try {
          var t = localStorage.getItem("vibestrate-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          }
          document.documentElement.classList.add(t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ink-0 text-fog-100 font-sans antialiased">
    <div class="vibestrate-backdrop" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
